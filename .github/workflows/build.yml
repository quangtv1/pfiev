name: Build OrientationPFIEV

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore OrientationPFIEV/OrientationPFIEV.csproj

      - name: Publish (win-x86, self-contained, single file)
        run: |
          dotnet publish OrientationPFIEV/OrientationPFIEV.csproj `
            -r win-x86 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -c Release `
            -o ./publish

      - name: Package into ZIP
        run: Compress-Archive -Path ./publish/* -DestinationPath ./OrientationPFIEV-win-x86.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrientationPFIEV-win-x86
          path: ./OrientationPFIEV-win-x86.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./OrientationPFIEV-win-x86.zip
          name: OrientationPFIEV ${{ github.ref_name }}
          body: |
            ## OrientationPFIEV ${{ github.ref_name }}

            Ứng dụng phân bổ thí sinh PFIEV — C# .NET 9 WinForms (win-x86, self-contained).

            ### Cài đặt
            1. Giải nén `OrientationPFIEV-win-x86.zip`
            2. Chạy `OrientationPFIEV.exe` — không cần cài .NET runtime

            ### Yêu cầu
            - Windows 10/11 (32-bit hoặc 64-bit)
            - **[Bắt buộc]** [Microsoft Access Database Engine 2010 Redistributable (32-bit)](https://www.microsoft.com/en-us/download/details.aspx?id=13255)
