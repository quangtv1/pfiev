name: Build OrientationPFIEV

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore OrientationPFIEV/OrientationPFIEV.csproj

      - name: Publish (win-x86, self-contained, single file)
        run: |
          dotnet publish OrientationPFIEV/OrientationPFIEV.csproj `
            -r win-x86 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -c Release `
            -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrientationPFIEV-win-x86
          path: ./publish/OrientationPFIEV.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./publish/OrientationPFIEV.exe
          name: OrientationPFIEV ${{ github.ref_name }}
          body: |
            ## OrientationPFIEV ${{ github.ref_name }}

            Ứng dụng phân bổ thí sinh PFIEV — C# .NET 9 WinForms (win-x86, self-contained).

            ### Cài đặt
            Tải `OrientationPFIEV.exe` và chạy trực tiếp, không cần cài .NET runtime.

            ### Yêu cầu
            - Windows (32-bit hoặc 64-bit)
            - Microsoft Access Database Engine 2010 (32-bit) nếu dùng cơ sở dữ liệu .mdb
