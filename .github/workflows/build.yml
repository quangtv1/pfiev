name: Build OrientationPFIEV

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore OrientationPFIEV/OrientationPFIEV.csproj

      - name: Publish (win-x86, self-contained, single file)
        run: |
          dotnet publish OrientationPFIEV/OrientationPFIEV.csproj `
            -r win-x86 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -c Release `
            -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrientationPFIEV-win-x86
          path: ./publish/OrientationPFIEV.exe
          retention-days: 30
