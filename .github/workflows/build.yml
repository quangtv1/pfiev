name: Build PhanBo-PFIEV

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pyinstaller-hooks-contrib pyodbc

      - name: Create SQLite databases
        run: python scripts/create_dbs.py

      - name: Build exe with PyInstaller
        run: pyinstaller PhanBo-PFIEV.spec

      - name: Package into ZIP
        run: Compress-Archive -Path dist/PhanBo-PFIEV -DestinationPath PhanBo-PFIEV-win-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhanBo-PFIEV-win-x64
          path: PhanBo-PFIEV-win-x64.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PhanBo-PFIEV-win-x64.zip
          name: PhanBo-PFIEV ${{ github.ref_name }}
          body: |
            ## PhanBo-PFIEV ${{ github.ref_name }}

            Phần mềm phân bổ chuyên ngành PFIEV — Python 3.12 + PySide6.

            ### Cài đặt
            1. Tải `PhanBo-PFIEV-win-x64.zip`
            2. Giải nén toàn bộ thư mục
            3. Chạy `PhanBo-PFIEV.exe` — không cần cài Python
